<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사주해 - 오프라인</title>
  <style>
    body { background: #0a0a0f; color: #e0d5c7; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; }
    .container { padding: 2rem; }
    h1 { color: #f59e0b; font-size: 2rem; margin-bottom: 1rem; }
    p { color: #a09585; margin-bottom: 2rem; }
    button { background: #f59e0b; color: #0a0a0f; border: none; padding: 0.75rem 2rem; border-radius: 0.5rem; font-size: 1rem; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📡 오프라인</h1>
    <p>인터넷 연결이 없습니다.<br>연결을 확인한 후 다시 시도해 주세요.</p>
    <button onclick="location.reload()">다시 시도</button>
  </div>
</body>
</html>
